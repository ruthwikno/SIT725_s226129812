<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom Style Sheet-->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <h1>Welcome to the Book Server</h1>
        <p>This page is being served using Express!</p>
    </div>
    <script>
    fetch('/api/books')
      .then(res => res.json())
      .then(response => {
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        response.data.forEach(book => {
          const li = document.createElement('li');
          li.innerHTML = `<div class="title">${book.title}</div>
                          <div class="author">by ${book.author}</div>`;
          list.appendChild(li);
        });
      })
      .catch(err => {
        document.getElementById('book-list').textContent = 'Failed to load books.';
        console.error(err);
      });
  </script>
</body>
</html>
